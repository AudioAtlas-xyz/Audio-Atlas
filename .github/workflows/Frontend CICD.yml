name: Frontend CI/CD

on:
  workflow_dispatch:

  pull_request:
    branches:
      - main
    paths:
      - "frontend/**"

  push:
    branches:
      - main
    paths:
      - "frontend/**"

jobs:

  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Nuxt app
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend
          path: frontend/.output/public


  test:
    runs-on: ubuntu-latest
    needs: build

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prepare Nuxt
        run: npx nuxt prepare

      - name: Run frontend tests
        run: npm run test


  deploy:
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.ref == 'refs/heads/main'
  
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
  
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend
          path: .
  
      - name: Deploy to Azure Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_JOLLY_BUSH_0E77D2C03 }}
          action: upload
          app_location: .
          output_location: .
